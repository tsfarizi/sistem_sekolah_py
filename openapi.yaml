      responses:
        '200':
          description: Laporan kelas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LaporanKelasResponse'
        '403':
          description: Forbidden (Siswa tidak boleh akses)

  /laporan/siswa/{nis}:
    get:
      tags:
        - Laporan
      summary: Laporan individu siswa
      description: >
        Admin & Guru: lihat laporan siswa manapun.
        Siswa: hanya lihat laporan sendiri.
      operationId: getLaporanSiswa
      parameters:
        - name: nis
          in: path
          required: true
          schema:
            type: string
          example: "20240001"
      responses:
        '200':
          description: Laporan individu siswa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LaporanSiswaResponse'
