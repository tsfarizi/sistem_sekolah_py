  # ═══════════════════════════════════════════
  # GURU MENGAJAR
  # ═══════════════════════════════════════════
  /guru-mengajar:
    get:
      tags:
        - Guru Mengajar
      summary: List semua assignment mengajar
      description: Filterable by guru_id, kelas_id, mata_pelajaran_id.
      operationId: listGuruMengajar
      parameters:
        - name: guru_id
          in: query
          schema:
            type: string
          description: Filter by guru (opsional)
          example: "G001"
        - name: kelas_id
          in: query
          schema:
            type: integer
          description: Filter by kelas (opsional)
          example: 1
        - name: mata_pelajaran_id
          in: query
          schema:
            type: integer
          description: Filter by mata pelajaran (opsional)
          example: 1
      responses:
        '200':
          description: Daftar assignment mengajar
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GuruMengajar'

    post:
      tags:
        - Guru Mengajar
      summary: Assign guru ke kelas + mata pelajaran
      description: >
        Hanya role Admin.
        Satu guru bisa mengajar banyak mapel di banyak kelas.
        Kombinasi (guru_id, kelas_id, mata_pelajaran_id) harus unik.
      operationId: createGuruMengajar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GuruMengajarCreate'
      responses:
        '201':
          description: Assignment berhasil dibuat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuruMengajar'
        '400':
          description: Validasi gagal (duplikat assignment)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden

  /guru-mengajar/{id}:
    get:
      tags:
        - Guru Mengajar
      summary: Detail assignment by ID
      operationId: getGuruMengajarById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Detail assignment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuruMengajar'
        '404':
          description: Assignment tidak ditemukan

    delete:
      tags:
        - Guru Mengajar
      summary: Hapus assignment mengajar
      description: Hanya role Admin.
      operationId: deleteGuruMengajar
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Assignment berhasil dihapus
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          description: Forbidden
        '404':
          description: Assignment tidak ditemukan

  # ═══════════════════════════════════════════
  # NILAI
  # ═══════════════════════════════════════════
  /nilai:
    get:
      tags:
        - Nilai
      summary: List semua nilai
      description: >
        Admin & Guru: lihat semua nilai.
        Siswa: hanya lihat nilai milik sendiri.
      operationId: listNilai
      parameters:
        - name: kelas_id
          in: query
          schema:
            type: integer
          description: Filter berdasarkan kelas (opsional, via guru_mengajar.kelas_id)
          example: 1
        - name: mata_pelajaran_id
          in: query
          schema:
            type: integer
          description: Filter berdasarkan mata pelajaran (opsional, via guru_mengajar.mata_pelajaran_id)
          example: 1
      responses:
        '200':
          description: Daftar nilai (dengan expanded data guru, mapel, kelas)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Nilai'

    post:
      tags:
        - Nilai
      summary: Input nilai baru
      description: >
        Hanya role Guru & Admin.
        Nilai Akhir dan Status dihitung OTOMATIS oleh server.
        Validasi: tugas, uts, uas harus dalam rentang 0-100.
      operationId: createNilai
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NilaiCreate'
      responses:
        '201':
          description: Nilai berhasil diinput (termasuk nilai_akhir & status)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Nilai'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden

  /nilai/{id}:
    get:
      tags:
        - Nilai
      summary: Detail nilai by ID
      operationId: getNilaiById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Detail nilai
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Nilai'
        '404':
          description: Nilai tidak ditemukan

    put:
      tags:
        - Nilai
      summary: Update nilai
      description: >
        Hanya role Guru & Admin.
        Nilai Akhir dan Status dihitung ulang OTOMATIS oleh server.
      operationId: updateNilai
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NilaiUpdate'
      responses:
        '200':
          description: Nilai berhasil diupdate (termasuk nilai_akhir & status baru)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Nilai'
        '400':
          description: Validasi gagal
        '403':
          description: Forbidden
        '404':
          description: Nilai tidak ditemukan

    delete:
      tags:
        - Nilai
      summary: Hapus nilai
      description: Hanya role Admin.
      operationId: deleteNilai
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Nilai berhasil dihapus
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '403':
          description: Forbidden
        '404':
          description: Nilai tidak ditemukan

  /nilai/siswa/{nis}:
    get:
      tags:
        - Nilai
      summary: List nilai siswa tertentu
      description: >
        Admin & Guru: lihat nilai siswa manapun.
        Siswa: hanya lihat nilai sendiri (nis = nis miliknya).
      operationId: listNilaiBySiswa
      parameters:
        - name: nis
          in: path
          required: true
          schema:
            type: string
          example: "20240001"
      responses:
        '200':
          description: Daftar nilai siswa
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Nilai'
        '403':
          description: Siswa mencoba akses nilai siswa lain
        '404':
          description: Siswa tidak ditemukan

  # ═══════════════════════════════════════════
  # LAPORAN
  # ═══════════════════════════════════════════
  /laporan:
    get:
      tags:
        - Laporan
      summary: Laporan per kelas
      description: >
